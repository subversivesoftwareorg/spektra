<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#131b2e"/>
      <stop offset="100%" stop-color="#0a0f1c"/>
    </linearGradient>
    <linearGradient id="specLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="35%" stop-color="#22d3ee"/>
      <stop offset="65%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="specFill" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#06b6d4" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0a0f1c" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="225" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="#1e2d4a" stroke-width="1">
    <line x1="140" y1="370" x2="884" y2="370"/>
    <line x1="140" y1="470" x2="884" y2="470"/>
    <line x1="140" y1="570" x2="884" y2="570"/>
    <line x1="140" y1="670" x2="884" y2="670"/>
    <line x1="140" y1="770" x2="884" y2="770"/>
    <line x1="260" y1="270" x2="260" y2="770"/>
    <line x1="400" y1="270" x2="400" y2="770"/>
    <line x1="540" y1="270" x2="540" y2="770"/>
    <line x1="680" y1="270" x2="680" y2="770"/>
    <line x1="820" y1="270" x2="820" y2="770"/>
  </g>

  <!-- Spectrum fill (area under curve) -->
  <path d="M 140 740
    C 200 736, 280 728, 340 718
    C 380 706, 410 678, 440 620
    C 460 568, 480 468, 500 368
    C 510 318, 520 280, 530 268
    C 540 256, 548 278, 558 318
    C 578 398, 598 458, 628 508
    C 648 536, 668 548, 688 544
    C 700 540, 712 526, 722 516
    C 732 506, 740 510, 750 528
    C 768 560, 800 630, 838 690
    C 858 714, 874 730, 884 738
    L 884 770 L 140 770 Z"
    fill="url(#specFill)"/>

  <!-- Spectrum curve -->
  <path d="M 140 740
    C 200 736, 280 728, 340 718
    C 380 706, 410 678, 440 620
    C 460 568, 480 468, 500 368
    C 510 318, 520 280, 530 268
    C 540 256, 548 278, 558 318
    C 578 398, 598 458, 628 508
    C 648 536, 668 548, 688 544
    C 700 540, 712 526, 722 516
    C 732 506, 740 510, 750 528
    C 768 560, 800 630, 838 690
    C 858 714, 874 730, 884 738"
    fill="none" stroke="url(#specLine)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Radio wave arcs emanating from peak -->
  <path d="M 488 218 A 58 42 0 0 0 572 218"
    fill="none" stroke="#22d3ee" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
  <path d="M 454 182 A 100 62 0 0 0 606 182"
    fill="none" stroke="#60a5fa" stroke-width="5" stroke-linecap="round" opacity="0.55"/>
  <path d="M 420 148 A 142 82 0 0 0 640 148"
    fill="none" stroke="#a78bfa" stroke-width="4" stroke-linecap="round" opacity="0.35"/>

  <!-- Peak highlight -->
  <circle cx="530" cy="268" r="28" fill="url(#glow)"/>
  <circle cx="530" cy="268" r="8" fill="#22d3ee"/>
</svg>
